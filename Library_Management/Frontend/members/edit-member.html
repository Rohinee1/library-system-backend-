<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Member | Library Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dashboard.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f8fc;
}

.container-box{
max-width:1200px;
margin:30px auto;
padding:20px;
}

.page-card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.profile-img{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:5px solid #2563eb;
}

.form-control,
.form-select{
height:52px;
border-radius:10px;
}

textarea.form-control{
height:auto;
}

.btn-update{
background:#2563eb;
border:none;
padding:12px 30px;
border-radius:10px;
font-weight:600;
}

.btn-delete{
background:#ef4444;
border:none;
padding:12px 30px;
border-radius:10px;
font-weight:600;
}

.btn-renew{
background:#10b981;
border:none;
padding:12px 30px;
border-radius:10px;
font-weight:600;
}

.status-badge{
display:inline-block;
padding:8px 15px;
background:#dcfce7;
color:#166534;
border-radius:20px;
font-weight:600;
margin-top:15px;
}

</style>

</head>
<body>

<div class="container-box">

<div class="page-card">

<div class="d-flex justify-content-between align-items-center mb-4">

<div>
<h2>Edit Member</h2>
<p class="text-muted">
Update member details and membership information
</p>
</div>

<a href="members.html" class="btn btn-outline-primary">
Back
</a>

</div>

<form>

<div class="row">

<div class="col-lg-4 text-center">

<img
src="https://i.pravatar.cc/300?img=12"
class="profile-img mb-3">

<div>
<input
type="file"
class="form-control">
</div>

<div class="status-badge">
Active Member
</div>

</div>

<div class="col-lg-8">

<div class="row">

<div class="col-md-6 mb-3">
<label>Member ID</label>
<input
type="text"
class="form-control"
value="M001"
readonly>
</div>

<div class="col-md-6 mb-3">
<label>Full Name</label>
<input
type="text"
class="form-control"
value="Rahul Sharma">
</div>

<div class="col-md-6 mb-3">
<label>Email Address</label>
<input
type="email"
class="form-control"
value="rahul@gmail.com">
</div>

<div class="col-md-6 mb-3">
<label>Phone Number</label>
<input
type="text"
class="form-control"
value="9876543210">
</div>

<div class="col-md-6 mb-3">
<label>Department</label>

<select class="form-select">
<option selected>Computer Engineering</option>
<option>Information Technology</option>
<option>Mechanical</option>
<option>Civil</option>
</select>

</div>

<div class="col-md-6 mb-3">

<label>Membership Type</label>

<select class="form-select">
<option selected>Student</option>
<option>Faculty</option>
<option>Staff</option>
</select>

</div>

<div class="col-md-6 mb-3">

<label>Membership Status</label>

<select class="form-select">
<option selected>Active</option>
<option>Suspended</option>
<option>Expired</option>
</select>

</div>

<div class="col-md-6 mb-3">

<label>Membership Expiry</label>

<input
type="date"
class="form-control"
value="2027-06-15">

</div>

</div>

</div>

</div>

<div class="mt-4">

<label>Address</label>

<textarea
class="form-control"
rows="4">Nashik, Maharashtra, India</textarea>

</div>

<div class="row mt-3">

<div class="col-md-6">

<label>Emergency Contact Name</label>

<input
type="text"
class="form-control"
value="Amit Sharma">

</div>

<div class="col-md-6">

<label>Emergency Contact Number</label>

<input
type="text"
class="form-control"
value="9988776655">

</div>

</div>

<div class="mt-4 d-flex gap-3 flex-wrap">

<button
type="submit"
class="btn btn-primary btn-update">

<i class="fas fa-save"></i>
 Save Changes

</button>

<button
type="button"
class="btn btn-success btn-renew">

<i class="fas fa-arrows-rotate"></i>
 Renew Membership

</button>

<button
type="button"
class="btn btn-danger btn-delete">

<i class="fas fa-trash"></i>
 Delete Member

</button>

</div>

</form>

</div>

</div>
<script src="../assets/js/members.js"></script>

</body>
</html>
