<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Issue Book | Library Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dashboard.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f8fc;
}

.container-box{
max-width:1400px;
margin:30px auto;
padding:20px;
}

.page-card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.info-card{
background:#f8fafc;
padding:20px;
border-radius:15px;
height:100%;
}

.form-control,
.form-select{
height:52px;
border-radius:10px;
}

.book-cover{
width:120px;
border-radius:10px;
}

.available{
background:#dcfce7;
color:#166534;
padding:8px 15px;
border-radius:20px;
font-weight:600;
}

.issue-btn{
background:#2563eb;
border:none;
padding:14px 35px;
border-radius:10px;
font-weight:600;
}

.issue-btn:hover{
background:#1e40af;
}

</style>
</head>

<body>

<div class="container-box">

<div class="page-card">

<div class="d-flex justify-content-between align-items-center mb-4">

<div>

<h2>Issue Book</h2>

<p class="text-muted">
Assign a book to a library member
</p>

</div>

<a href="../dashboard.html"
class="btn btn-outline-primary">

Back

</a>

</div>

<form>

<div class="row">

<div class="col-md-6 mb-3">

<label>Search Member</label>

<input
type="text"
class="form-control"
placeholder="Enter Member ID or Name">

</div>

<div class="col-md-6 mb-3">

<label>Search Book</label>

<input
type="text"
class="form-control"
placeholder="Enter Book ID, ISBN or Title">

</div>

</div>

<div class="row mt-4">

<div class="col-lg-6">

<div class="info-card">

<h5 class="mb-3">
Member Information
</h5>

<p><strong>Member ID:</strong> M001</p>
<p><strong>Name:</strong> Rahul Sharma</p>
<p><strong>Department:</strong> Computer Engineering</p>
<p><strong>Books Issued:</strong> 4</p>

</div>

</div>

<div class="col-lg-6">

<div class="info-card">

<div class="d-flex gap-3">

<img
src="https://picsum.photos/150/220"
class="book-cover">

<div>

<h5>
Python Programming
</h5>

<p>John Smith</p>

<p>
ISBN:
978123456789
</p>

<span class="available">
Available
</span>

</div>

</div>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-md-6">

<label>Issue Date</label>

<input
type="date"
class="form-control">

</div>

<div class="col-md-6">

<label>Due Date</label>

<input
type="date"
class="form-control">

</div>

</div>

<div class="mt-4">

<button
type="submit"
class="btn btn-primary issue-btn">

<i class="fas fa-book-open"></i>

 Issue Book

</button>

</div>

</form>

</div>

</div>
<script src="../assets/js/books.js"></script>

</body>
</html>
