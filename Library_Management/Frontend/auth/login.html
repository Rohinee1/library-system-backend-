<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Management System - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/auth.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f8fc;
height:100vh;
overflow:hidden;
}

.login-container{
height:100vh;
display:flex;
}

.left-panel{
flex:1;
background:linear-gradient(
135deg,
#1e40af,
#2563eb,
#3b82f6
);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:50px;
color:white;
position:relative;
overflow:hidden;
}

.left-panel::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,.05);
border-radius:50%;
top:-150px;
right:-150px;
}

.left-panel::after{
content:'';
position:absolute;
width:400px;
height:400px;
background:rgba(255,255,255,.05);
border-radius:50%;
bottom:-100px;
left:-100px;
}

.logo-icon{
font-size:90px;
margin-bottom:20px;
color:#fbbf24;
z-index:2;
}

.left-panel h1{
font-weight:700;
font-size:40px;
z-index:2;
}

.left-panel p{
font-size:18px;
opacity:.9;
text-align:center;
max-width:450px;
z-index:2;
}

.right-panel{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:white;
}

.login-card{
width:450px;
padding:40px;
background:white;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.08);
}

.login-card h2{
font-weight:700;
color:#1e293b;
margin-bottom:10px;
}

.login-card p{
color:#64748b;
margin-bottom:25px;
}

.form-label{
font-weight:500;
color:#334155;
}

.form-control{
height:52px;
border-radius:10px;
border:1px solid #dbe4f0;
}

.form-control:focus{
box-shadow:none;
border-color:#2563eb;
}

.btn-login{
height:52px;
border:none;
border-radius:10px;
background:#2563eb;
font-weight:600;
font-size:16px;
transition:.3s;
}

.btn-login:hover{
background:#1e40af;
}

.extra-links{
display:flex;
justify-content:space-between;
margin-top:15px;
}

.extra-links a{
text-decoration:none;
font-size:14px;
color:#2563eb;
}

.extra-links a:hover{
color:#1e40af;
}

.social-login{
margin-top:25px;
text-align:center;
}

.social-login button{
width:48%;
height:48px;
border-radius:10px;
border:1px solid #dbe4f0;
background:white;
font-weight:500;
}

.divider{
text-align:center;
margin:20px 0;
position:relative;
}

.divider::before{
content:'';
position:absolute;
top:50%;
left:0;
width:100%;
height:1px;
background:#e2e8f0;
}

.divider span{
background:white;
padding:0 15px;
position:relative;
color:#64748b;
}

@media(max-width:992px){

.left-panel{
display:none;
}

.right-panel{
width:100%;
}

}

</style>

</head>
<body>

<div class="login-container">

<div class="left-panel">

<div class="logo-icon">
<i class="fas fa-book-open-reader"></i>
</div>

<h1>Library Management System</h1>

<p>
Manage books, members, fines, reports,
issue-return operations and analytics
from one professional dashboard.
</p>

</div>

<div class="right-panel">

<div class="login-card">

<h2>Welcome Back 👋</h2>

<p>Login to access your library dashboard.</p>

<form>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email"
class="form-control"
placeholder="Enter your email">
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password"
class="form-control"
placeholder="Enter your password">
</div>

<div class="d-flex justify-content-between mb-4">

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">
Remember me
</label>
</div>

<a href="forgot-password.html">Forgot Password?</a>

</div>

<button class="btn btn-primary btn-login w-100">

<i class="fas fa-right-to-bracket me-2"></i>

Login

</button>

</form>

<div class="divider">
<span>OR</span>
</div>

<div class="social-login d-flex justify-content-between">

<button>
<i class="fab fa-google text-danger"></i>
 Google
</button>

<button>
<i class="fab fa-microsoft text-primary"></i>
 Microsoft
</button>

</div>

<div class="text-center mt-4">

Don't have an account?

<a href="register.html"
class="fw-bold text-decoration-none">

Register

</a>

</div>

</div>

</div>

</div>
<script src="../assets/js/auth.js"></script>
</body>
</html>
