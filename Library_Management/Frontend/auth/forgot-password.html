<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | Library Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/auth.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f8fc;
height:100vh;
overflow:hidden;
}

.forgot-container{
height:100vh;
display:flex;
}

.left-panel{
flex:1;
background:linear-gradient(
135deg,
#1e40af,
#2563eb,
#3b82f6
);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
padding:50px;
position:relative;
overflow:hidden;
}

.left-panel::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,.05);
border-radius:50%;
top:-150px;
right:-150px;
}

.left-panel::after{
content:'';
position:absolute;
width:400px;
height:400px;
background:rgba(255,255,255,.05);
border-radius:50%;
bottom:-100px;
left:-100px;
}

.left-panel i{
font-size:90px;
color:#fbbf24;
margin-bottom:20px;
z-index:2;
}

.left-panel h1{
font-weight:700;
font-size:38px;
z-index:2;
}

.left-panel p{
max-width:450px;
text-align:center;
font-size:17px;
opacity:.9;
z-index:2;
}

.right-panel{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:white;
}

.forgot-card{
width:450px;
padding:40px;
background:white;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.08);
}

.forgot-card h2{
font-weight:700;
color:#1e293b;
}

.forgot-card p{
color:#64748b;
margin-bottom:25px;
}

.form-label{
font-weight:500;
}

.form-control{
height:52px;
border-radius:10px;
border:1px solid #dbe4f0;
}

.form-control:focus{
box-shadow:none;
border-color:#2563eb;
}

.btn-reset{
height:52px;
border:none;
background:#2563eb;
font-weight:600;
border-radius:10px;
}

.btn-reset:hover{
background:#1e40af;
}

.back-link{
text-align:center;
margin-top:20px;
}

.back-link a{
text-decoration:none;
font-weight:600;
color:#2563eb;
}

.back-link a:hover{
color:#1e40af;
}

.success-box{
display:none;
background:#dcfce7;
color:#166534;
padding:12px;
border-radius:10px;
margin-bottom:20px;
}

@media(max-width:992px){

.left-panel{
display:none;
}

.right-panel{
width:100%;
}

}

</style>

</head>

<body>

<div class="forgot-container">

<div class="left-panel">

<i class="fas fa-key"></i>

<h1>Password Recovery</h1>

<p>
Don't worry. Enter your registered email
address and we'll send a password reset link.
</p>

</div>

<div class="right-panel">

<div class="forgot-card">

<h2>Forgot Password?</h2>

<p>
Enter your email to receive a password reset link.
</p>

<div class="success-box" id="successMessage">

<i class="fas fa-circle-check"></i>

Password reset link sent successfully.

</div>

<form id="forgotForm">

<div class="mb-4">

<label class="form-label">

Registered Email

</label>

<input
type="email"
class="form-control"
placeholder="Enter your email"
required>

</div>

<button
type="submit"
class="btn btn-primary btn-reset w-100">

<i class="fas fa-paper-plane me-2"></i>

Send Reset Link

</button>

</form>

<div class="back-link">

<a href="login.html">

<i class="fas fa-arrow-left"></i>

Back To Login

</a>

</div>

</div>

</div>

</div>

<script>

document
.getElementById("forgotForm")
.addEventListener("submit",function(e){

e.preventDefault();

document
.getElementById("successMessage")
.style.display="block";

});

</script>
<script src="../assets/js/auth.js"></script>
</body>
</html>
