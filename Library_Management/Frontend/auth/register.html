<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Library Management System - Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/auth.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f8fc;
min-height:100vh;
overflow-x:hidden;
}

.register-container{
min-height:100vh;
display:flex;
}

.left-panel{
flex:1;
background:linear-gradient(
135deg,
#1e40af,
#2563eb,
#3b82f6
);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:50px;
color:white;
position:relative;
overflow:hidden;
}

.left-panel::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,.05);
border-radius:50%;
top:-150px;
right:-150px;
}

.left-panel::after{
content:'';
position:absolute;
width:400px;
height:400px;
background:rgba(255,255,255,.05);
border-radius:50%;
bottom:-100px;
left:-100px;
}

.logo-icon{
font-size:90px;
margin-bottom:20px;
color:#fbbf24;
z-index:2;
}

.left-panel h1{
font-size:40px;
font-weight:700;
z-index:2;
}

.left-panel p{
font-size:18px;
text-align:center;
max-width:450px;
opacity:.9;
z-index:2;
}

.right-panel{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:white;
padding:40px;
}

.register-card{
width:100%;
max-width:600px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.08);
}

.register-card h2{
font-weight:700;
color:#1e293b;
}

.register-card p{
color:#64748b;
margin-bottom:25px;
}

.form-label{
font-weight:500;
color:#334155;
}

.form-control,
.form-select{
height:52px;
border-radius:10px;
border:1px solid #dbe4f0;
}

.form-control:focus,
.form-select:focus{
box-shadow:none;
border-color:#2563eb;
}

.btn-register{
height:55px;
background:#2563eb;
border:none;
font-weight:600;
font-size:16px;
border-radius:10px;
transition:.3s;
}

.btn-register:hover{
background:#1e40af;
}

.login-link{
text-align:center;
margin-top:20px;
}

.login-link a{
text-decoration:none;
font-weight:600;
color:#2563eb;
}

.login-link a:hover{
color:#1e40af;
}

@media(max-width:992px){

.left-panel{
display:none;
}

.right-panel{
width:100%;
}

}

</style>

</head>

<body>

<div class="register-container">

<div class="left-panel">

<div class="logo-icon">
<i class="fas fa-book-open-reader"></i>
</div>

<h1>Join Our Library</h1>

<p>
Register to access thousands of books,
manage borrowings, track fines and
enjoy a complete digital library experience.
</p>

</div>

<div class="right-panel">

<div class="register-card">

<h2>Create Account</h2>

<p>Fill in your details to get started.</p>

<form>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Full Name
</label>

<input type="text"
class="form-control"
placeholder="Enter Full Name">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Username
</label>

<input type="text"
class="form-control"
placeholder="Choose Username">

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Email Address
</label>

<input type="email"
class="form-control"
placeholder="Enter Email">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Phone Number
</label>

<input type="text"
class="form-control"
placeholder="Enter Phone">

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Department
</label>

<select class="form-select">

<option>Select Department</option>

<option>Computer Science</option>

<option>Information Technology</option>

<option>Mechanical</option>

<option>Electrical</option>

<option>Civil</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Membership Type
</label>

<select class="form-select">

<option>Select Type</option>

<option>Student</option>

<option>Faculty</option>

<option>Staff</option>

</select>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Password
</label>

<input type="password"
class="form-control"
placeholder="Enter Password">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Confirm Password
</label>

<input type="password"
class="form-control"
placeholder="Confirm Password">

</div>

</div>

<div class="mb-4">

<label class="form-label">
Address
</label>

<textarea
class="form-control"
rows="3"
style="height:auto;"
placeholder="Enter Address"></textarea>

</div>

<div class="form-check mb-4">

<input
class="form-check-input"
type="checkbox">

<label class="form-check-label">

I agree to the Terms &
Conditions

</label>

</div>

<button
type="submit"
class="btn btn-primary btn-register w-100">

<i class="fas fa-user-plus me-2"></i>

Create Account

</button>

</form>

<div class="login-link">

Already have an account?

<a href="login.html">

Login Here

</a>

</div>

</div>

</div>

</div>
<script src="../assets/js/auth.js"></script>
</body>
</html>
