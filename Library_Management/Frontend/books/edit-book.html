<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Book | Library Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dashboard.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f8fc;
}

.container-box{
max-width:1200px;
margin:30px auto;
padding:20px;
}

.page-card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.book-cover{
width:220px;
height:300px;
border-radius:15px;
object-fit:cover;
box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.form-control,
.form-select{
height:52px;
border-radius:10px;
}

textarea.form-control{
height:auto;
}

.btn-update{
background:#2563eb;
border:none;
padding:12px 30px;
border-radius:10px;
font-weight:600;
}

.btn-delete{
background:#ef4444;
border:none;
padding:12px 30px;
border-radius:10px;
font-weight:600;
}

.btn-view{
background:#10b981;
border:none;
padding:12px 30px;
border-radius:10px;
font-weight:600;
}

</style>

</head>
<body>

<div class="container-box">

<div class="page-card">

<div class="d-flex justify-content-between align-items-center mb-4">

<div>
<h2>Edit Book</h2>
<p class="text-muted">Update existing book information</p>
</div>

<a href="books.html" class="btn btn-outline-primary">
Back
</a>

</div>

<form>

<div class="row">

<div class="col-lg-4 text-center">

<img
src="https://picsum.photos/300/450"
class="book-cover mb-3">

<input
type="file"
class="form-control">

</div>

<div class="col-lg-8">

<div class="row">

<div class="col-md-6 mb-3">
<label>ISBN</label>
<input
type="text"
class="form-control"
value="978123456789">
</div>

<div class="col-md-6 mb-3">
<label>Book Title</label>
<input
type="text"
class="form-control"
value="Python Programming">
</div>

<div class="col-md-6 mb-3">
<label>Author</label>
<input
type="text"
class="form-control"
value="John Smith">
</div>

<div class="col-md-6 mb-3">
<label>Publisher</label>
<input
type="text"
class="form-control"
value="Tech Publications">
</div>

<div class="col-md-6 mb-3">
<label>Category</label>

<select class="form-select">
<option selected>Programming</option>
<option>Database</option>
<option>Networking</option>
<option>Science</option>
</select>

</div>

<div class="col-md-6 mb-3">
<label>Language</label>

<select class="form-select">
<option selected>English</option>
<option>Hindi</option>
<option>Marathi</option>
</select>

</div>

<div class="col-md-6 mb-3">
<label>Quantity</label>
<input
type="number"
class="form-control"
value="20">
</div>

<div class="col-md-6 mb-3">
<label>Shelf Number</label>
<input
type="text"
class="form-control"
value="A-101">
</div>

</div>

</div>

</div>

<div class="mt-4">

<label>Description</label>

<textarea
class="form-control"
rows="5">Complete guide to Python programming language including advanced concepts and practical examples.</textarea>

</div>

<div class="mt-4 d-flex gap-3 flex-wrap">

<button
type="submit"
class="btn btn-primary btn-update">

<i class="fas fa-save"></i>
 Update Book

</button>

<button
type="button"
class="btn btn-success btn-view">

<i class="fas fa-eye"></i>
 View Details

</button>

<button
type="button"
class="btn btn-danger btn-delete">

<i class="fas fa-trash"></i>
 Delete Book

</button>

</div>

</form>

</div>

</div>
<script src="../assets/js/books.js"></script>

</body>
</html>
