<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reports Dashboard | Library Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dashboard.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f8fc;
}

.container-box{
max-width:1400px;
margin:30px auto;
padding:20px;
}

.summary-card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
height:100%;
}

.summary-card h2{
font-weight:700;
color:#2563eb;
}

.report-card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
height:100%;
transition:.3s;
}

.report-card:hover{
transform:translateY(-5px);
}

.report-icon{
font-size:45px;
color:#2563eb;
margin-bottom:15px;
}

.chart-card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
margin-top:25px;
}

</style>

</head>

<body>

<div class="container-box">

<h2 class="mb-4">
Reports & Analytics
</h2>

<div class="row g-4">

<div class="col-md-3">
<div class="summary-card">
<h2>2540</h2>
<p>Total Books</p>
</div>
</div>

<div class="col-md-3">
<div class="summary-card">
<h2>1250</h2>
<p>Total Members</p>
</div>
</div>

<div class="col-md-3">
<div class="summary-card">
<h2>745</h2>
<p>Books Issued</p>
</div>
</div>

<div class="col-md-3">
<div class="summary-card">
<h2>₹48,750</h2>
<p>Fine Collection</p>
</div>
</div>

</div>

<div class="row g-4 mt-3">

<div class="col-md-4">

<a href="borrowing-report.html"
style="text-decoration:none;color:inherit;">

<div class="report-card">

<div class="report-icon">
<i class="fas fa-book-reader"></i>
</div>

<h4>Borrowing Report</h4>

<p class="text-muted">
Track issued and returned books
</p>

</div>

</a>

</div>

<div class="col-md-4">

<a href="fine-report.html"
style="text-decoration:none;color:inherit;">

<div class="report-card">

<div class="report-icon">
<i class="fas fa-money-bill-wave"></i>
</div>

<h4>Fine Report</h4>

<p class="text-muted">
Analyze collected and pending fines
</p>

</div>

</a>

</div>

<div class="col-md-4">

<a href="inventory-report.html"
style="text-decoration:none;color:inherit;">

<div class="report-card">

<div class="report-icon">
<i class="fas fa-boxes-stacked"></i>
</div>

<h4>Inventory Report</h4>

<p class="text-muted">
Monitor library stock and availability
</p>

</div>

</a>

</div>

</div>

<div class="chart-card">

<div class="d-flex justify-content-between align-items-center mb-4">

<h4>Monthly Borrowing Trend</h4>

<div>

<button class="btn btn-outline-primary">
PDF
</button>

<button class="btn btn-primary">
Excel
</button>

</div>

</div>

<canvas id="borrowChart"></canvas>

</div>

</div>

<script>

const ctx =
document.getElementById('borrowChart');

new Chart(ctx,{
type:'bar',
data:{
labels:[
'Jan','Feb','Mar',
'Apr','May','Jun'
],
datasets:[{
label:'Books Borrowed',
data:[120,150,180,220,250,300]
}]
}
});

</script>
<script src="../assets/js/reports.js"></script>

</body>
</html>
